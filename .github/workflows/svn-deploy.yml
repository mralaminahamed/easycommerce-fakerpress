name: Release Plugin to WP.org

on:
  push:
    tags:
      - "*"

permissions:
  contents: write # Required to create a GitHub release

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

# ---------------------------------------------------------------------------
# Shared defaults applied to every job
# ---------------------------------------------------------------------------
defaults:
  run:
    shell: bash

jobs:

  # -------------------------------------------------------------------------
  # JOB 1 — meta
  # Derives plugin identifiers and validates tag/version alignment.
  # Outputs are consumed by every downstream job so nothing is re-computed.
  # -------------------------------------------------------------------------
  meta:
    name: "Meta: Resolve plugin info & validate version"
    runs-on: ubuntu-latest
    outputs:
      plugin_slug:    ${{ steps.plugin_name.outputs.plugin_slug }}
      plugin_file:    ${{ steps.plugin_name.outputs.plugin_file }}
      plugin_name:    ${{ steps.plugin_name.outputs.plugin_name }}
      version:        ${{ steps.version_check.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Derive plugin identifiers from repository name
        id: plugin_name
        run: |
          # github.event.repository.name is empty under `act` (local CI simulation).
          # Resolution order:
          #   1. GitHub Actions context  (real CI)
          #   2. Git remote URL slug     (act + git remote configured)
          #   3. Working directory name  (act fallback)
          PLUGIN_SLUG="${{ github.event.repository.name }}"

          if [ -z "$PLUGIN_SLUG" ]; then
            REMOTE_URL=$(git remote get-url origin 2>/dev/null || true)
            if [ -n "$REMOTE_URL" ]; then
              PLUGIN_SLUG=$(basename "$REMOTE_URL" .git)
            fi
          fi

          if [ -z "$PLUGIN_SLUG" ]; then
            PLUGIN_SLUG=$(basename "$GITHUB_WORKSPACE")
          fi

          if [ -z "$PLUGIN_SLUG" ]; then
            echo "::error::Could not determine plugin slug from any source." >&2
            exit 1
          fi

          PLUGIN_FILE="${PLUGIN_SLUG}.php"
          # Convert kebab-case slug → Title Case display name
          PLUGIN_NAME=$(echo "$PLUGIN_SLUG" | sed 's/-/ /g; s/\b\w/\U&/g')

          echo "Resolved slug : $PLUGIN_SLUG"
          echo "Resolved file : $PLUGIN_FILE"
          echo "Resolved name : $PLUGIN_NAME"

          echo "plugin_slug=$PLUGIN_SLUG" >> "$GITHUB_OUTPUT"
          echo "plugin_file=$PLUGIN_FILE"  >> "$GITHUB_OUTPUT"
          echo "plugin_name=$PLUGIN_NAME"  >> "$GITHUB_OUTPUT"

      - name: Validate tag / plugin-header version alignment
        id: version_check
        run: |
          TAG_REF="${GITHUB_REF#refs/tags/}"
          # Strip an optional leading "v" (e.g. v1.2.3 → 1.2.3)
          TAG_STRIPPED="${TAG_REF#v}"

          PLUGIN_FILE="${{ steps.plugin_name.outputs.plugin_file }}"

          if [ ! -f "$PLUGIN_FILE" ]; then
            echo "::error::Plugin main file '$PLUGIN_FILE' not found in workspace. Ensure the repository name matches the plugin slug." >&2
            exit 1
          fi

          PLUGIN_VERSION=$(
            grep -E "^[[:space:]]*\*[[:space:]]*Version:" "$PLUGIN_FILE" \
              | head -n1 \
              | sed -E 's/.*Version:[[:space:]]*([^[:space:]]+).*/\1/'
          )

          echo "Tag          : $TAG_REF"
          echo "Stripped tag : $TAG_STRIPPED"
          echo "Plugin header: $PLUGIN_VERSION"

          if [ -z "$PLUGIN_VERSION" ]; then
            echo "::error::Could not extract Version from $PLUGIN_FILE" >&2
            exit 1
          fi

          if [ "$PLUGIN_VERSION" != "$TAG_STRIPPED" ]; then
            echo "::error::Version mismatch — tag ($TAG_STRIPPED) != plugin header ($PLUGIN_VERSION)" >&2
            exit 1
          fi

          echo "version=$PLUGIN_VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify composer.lock is committed
        run: |
          if [ ! -f composer.lock ]; then
            echo "::error::composer.lock is missing. Commit it before tagging a release." >&2
            exit 1
          fi

  # -------------------------------------------------------------------------
  # JOB 2 — build
  # Installs dependencies, compiles frontend assets, and uploads the built
  # plugin tree as a workflow artifact consumed by the deploy job.
  # -------------------------------------------------------------------------
  build:
    name: "Build: Install deps & compile assets"
    runs-on: ubuntu-latest
    needs: meta

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup PHP 7.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "7.4"
          coverage: none
          tools: composer:v2

      - name: Bootstrap Node.js runtime (act compatibility)
        # actions/setup-node@v6 is itself a Node.js action and requires `node` to
        # already exist in $PATH to bootstrap. The catthehacker/ubuntu:act-latest
        # image does not ship Node.js, so this step installs it via nvm when the
        # ACT environment variable is set (injected automatically by act).
        # On real GitHub-hosted runners this step is skipped entirely.
        if: ${{ env.ACT == 'true' }}
        run: |
          export NVM_DIR="$HOME/.nvm"
          if [ ! -s "$NVM_DIR/nvm.sh" ]; then
            curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
          fi
          . "$NVM_DIR/nvm.sh"
          nvm install 24
          nvm use 24
          nvm alias default 24
          # Persist nvm node path for subsequent steps in this job
          echo "$NVM_DIR/versions/node/$(nvm version)/bin" >> "$GITHUB_PATH"

      - name: Setup Node.js 24 (LTS)
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.composer/cache
            vendor
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-php74-

      - name: Cache Yarn node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: yarn-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-

      - name: Install PHP dependencies (including dev — needed for build tooling)
        run: composer install --no-interaction --prefer-dist

      - name: Install Node dependencies & build assets
        run: |
          corepack enable yarn
          yarn set version stable
          yarn install --frozen-lockfile
          yarn build

      - name: Guard — composer.lock must not change during build
        run: |
          if ! git diff --quiet --exit-code composer.lock; then
            echo "::error::composer.lock was modified during the build. Commit the updated lock file before releasing." >&2
            git --no-pager diff composer.lock | head -n 100
            exit 1
          fi

      - name: Optimise Composer autoloader for production (strip dev deps)
        run: composer install --no-dev --no-interaction --prefer-dist -o

      - name: Upload built plugin as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: plugin-build-${{ needs.meta.outputs.version }}
          path: |
            .
            !.git
            !node_modules
            !tests
            !.github
          retention-days: 1

  # -------------------------------------------------------------------------
  # JOB 3 — deploy
  # Cleans SVN trunk, deploys the built plugin to WordPress.org, and creates
  # the corresponding GitHub release with the generated ZIP attached.
  # -------------------------------------------------------------------------
  deploy:
    name: "Deploy: Publish to WP.org & create GitHub release"
    runs-on: ubuntu-latest
    needs: [meta, build]

    steps:
      - name: Download built plugin artifact
        uses: actions/download-artifact@v8
        with:
          name: plugin-build-${{ needs.meta.outputs.version }}
          path: .

      - name: Deploy plugin to WordPress.org via SVN
        id: deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        with:
          generate-zip: true
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG:         ${{ needs.meta.outputs.plugin_slug }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ needs.meta.outputs.version }}"
          body: |
            ## ${{ needs.meta.outputs.plugin_name }} — v${{ needs.meta.outputs.version }}

            Refer to [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full details.
          files: ${{ steps.deploy.outputs.zip-path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
