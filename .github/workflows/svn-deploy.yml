name: Release Plugin to WP.org

on:
  push:
    tags:
      - "*"

permissions:
  contents: write # Required to create a GitHub release

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

# ---------------------------------------------------------------------------
# Pipeline DAG (EasyCommerce FakerPress — no Freemius):
#
#   meta ──┬── lint ─────┐
#          ├── phpstan ───┤
#          ├── assets ────┼── package ── deploy
#          └── i18n ──────┘
#
#   meta     : resolve slug, validate tag == header version, prerelease flag
#   lint     : PHP syntax + sensitive scan + PHPCS (WPCS)  — gate, parallel
#   phpstan  : PHPStan (level max)                         — gate, parallel
#   assets   : wp-scripts build -> build/                  — producer, parallel
#   i18n     : wp i18n make-pot -> languages/              — producer, parallel
#   package  : composer --no-dev + .distignore rsync -> dist/<slug>, zip
#   deploy   : 10up SVN deploy (BUILD_DIR) + .wordpress-org assets + GH release
# ---------------------------------------------------------------------------
jobs:

  # -------------------------------------------------------------------------
  # JOB 1 — meta: resolve plugin identifiers and validate tag/version.
  # -------------------------------------------------------------------------
  meta:
    name: "Meta: validate version"
    runs-on: ubuntu-latest
    outputs:
      plugin_slug: ${{ steps.info.outputs.plugin_slug }}
      version:     ${{ steps.info.outputs.version }}
      prerelease:  ${{ steps.info.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v6
      - name: Resolve slug + validate tag matches plugin header
        id: info
        run: |
          SLUG="${{ github.event.repository.name }}"
          [ -n "$SLUG" ] || SLUG=$(basename "$(git remote get-url origin 2>/dev/null || echo "$GITHUB_WORKSPACE")" .git)
          FILE="${SLUG}.php"
          [ -f "$FILE" ] || { echo "::error::Plugin main file '$FILE' not found."; exit 1; }
          TAG="${GITHUB_REF#refs/tags/}"; TAG="${TAG#v}"
          VER=$(grep -E "^[[:space:]]*\*[[:space:]]*Version:" "$FILE" | head -n1 | sed -E 's/.*Version:[[:space:]]*([^[:space:]]+).*/\1/')
          echo "tag=$TAG  header=$VER"
          [ -n "$VER" ] || { echo "::error::Could not read Version from $FILE."; exit 1; }
          [ "$VER" = "$TAG" ] || { echo "::error::Version mismatch — tag ($TAG) != plugin header ($VER)."; exit 1; }
          [ -f composer.lock ] || { echo "::error::composer.lock is missing. Commit it before tagging."; exit 1; }
          PRE=false
          echo "$TAG" | grep -qE "(alpha|beta|rc)" && PRE=true
          {
            echo "plugin_slug=$SLUG"
            echo "version=$VER"
            echo "prerelease=$PRE"
          } >> "$GITHUB_OUTPUT"

  # -------------------------------------------------------------------------
  # JOB 2 — lint: PHP syntax + sensitive-file scan + PHPCS (WPCS). (parallel gate)
  # Mirrors the `@lint` step of the `composer release` script.
  # -------------------------------------------------------------------------
  lint:
    name: "Lint: PHPCS"
    runs-on: ubuntu-latest
    needs: meta
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "7.4"
          coverage: none
          tools: composer:v2
      - name: Cache Composer
        if: ${{ env.ACT != 'true' }}
        uses: actions/cache@v5
        with:
          path: |
            ~/.composer/cache
            vendor
          key: composer-lint-${{ runner.os }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-lint-${{ runner.os }}-
      - name: Composer install
        run: composer install --no-interaction --prefer-dist
      - name: Sensitive-file scan
        run: |
          for pat in ".env" ".env.local" "*.key" "*.pem" "wp-config.php" "config.php"; do
            compgen -G "$pat" > /dev/null && { echo "::error::Sensitive file: $pat"; exit 1; } || true
          done
          echo "No sensitive files."
      - name: PHP syntax lint
        run: |
          ERR=0
          while IFS= read -r -d $'\0' f; do
            php -l "$f" > /dev/null 2>&1 || { php -l "$f"; ERR=$((ERR+1)); }
          done < <(find . -type f -name "*.php" \
                     -not -path "./vendor/*" -not -path "./node_modules/*" \
                     -not -path "./build/*"  -not -path "./release/*" -not -path "./dist/*" -print0)
          [ "$ERR" -eq 0 ] || { echo "::error::PHP lint: $ERR error(s)."; exit 1; }
      - name: PHPCS (WordPress Coding Standards)
        run: composer phpcs

  # -------------------------------------------------------------------------
  # JOB 3 — phpstan: static analysis. (parallel gate)
  # Mirrors the `@analyse` step of the `composer release` script.
  # -------------------------------------------------------------------------
  phpstan:
    name: "PHPStan: static analysis"
    runs-on: ubuntu-latest
    needs: meta
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "7.4"
          coverage: none
          tools: composer:v2
      - name: Cache Composer
        if: ${{ env.ACT != 'true' }}
        uses: actions/cache@v5
        with:
          path: |
            ~/.composer/cache
            vendor
          key: composer-phpstan-${{ runner.os }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-phpstan-${{ runner.os }}-
      - name: Composer install
        run: composer install --no-interaction --prefer-dist
      - name: PHPStan (level max, 2G)
        run: composer phpstan

  # -------------------------------------------------------------------------
  # JOB 4 — assets: compile the React/wp-scripts bundles. (parallel) -> build/
  # -------------------------------------------------------------------------
  assets:
    name: "Assets: build bundles"
    runs-on: ubuntu-latest
    needs: meta
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Cache Yarn + node_modules
        if: ${{ env.ACT != 'true' }}
        uses: actions/cache@v5
        with:
          path: |
            .yarn/cache
            node_modules
          key: yarn-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-
      - name: Yarn install
        run: corepack enable && yarn install --immutable
      - name: Build assets (wp-scripts)
        run: yarn build
      - name: Upload build/
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ needs.meta.outputs.version }}
          path: build
          retention-days: 1

  # -------------------------------------------------------------------------
  # JOB 5 — i18n: generate the translation template. (parallel) -> languages/
  # -------------------------------------------------------------------------
  i18n:
    name: "i18n: translations"
    runs-on: ubuntu-latest
    needs: meta
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "7.4"
          coverage: none
          tools: composer:v2, wp-cli
      - name: Generate POT
        run: |
          mkdir -p languages
          composer makepot
      - name: Upload languages/
        uses: actions/upload-artifact@v7
        with:
          name: languages-${{ needs.meta.outputs.version }}
          path: languages
          retention-days: 1

  # -------------------------------------------------------------------------
  # JOB 6 — package: assemble the shippable distributable and zip it.
  # Barrier: needs the two producer jobs (assets, i18n).
  #
  # .distignore IS honoured here: the dist/<slug> tree is built with
  # `rsync --exclude-from=.distignore`, so it contains only what should ship
  # (php files, includes/, vendor/ prod, build/, languages/, readme.txt,
  # LICENSE). The deploy job then ships this tree verbatim via BUILD_DIR.
  # The guard below is defense-in-depth confirming the rsync filter held.
  # -------------------------------------------------------------------------
  package:
    name: "Package: assemble + zip"
    runs-on: ubuntu-latest
    needs: [meta, assets, i18n]
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "7.4"
          coverage: none
          tools: composer:v2
      - name: Download build/
        uses: actions/download-artifact@v8
        with:
          name: build-${{ needs.meta.outputs.version }}
          path: build
      - name: Download languages/
        uses: actions/download-artifact@v8
        with:
          name: languages-${{ needs.meta.outputs.version }}
          path: languages
      - name: Install production dependencies (lock-faithful, reproducible)
        run: |
          # `install` (not `update`) keeps vendor pinned to the committed lock
          # that meta verified and lint/phpstan exercised.
          composer install --no-dev --no-interaction --prefer-dist --no-scripts --optimize-autoloader
          composer dump-autoload --no-dev --optimize --classmap-authoritative
      - name: Assemble distributable (.distignore-filtered)
        run: |
          SLUG="${{ needs.meta.outputs.plugin_slug }}"
          rm -rf dist release
          mkdir -p "dist/$SLUG"
          rsync -a \
            --exclude-from='.distignore' \
            --exclude='/dist' \
            --exclude='/release' \
            ./ "dist/$SLUG/"
          [ -f "dist/$SLUG/$SLUG.php" ] || { echo "::error::Main file missing from distributable."; ls -R "dist/$SLUG" | head; exit 1; }
      - name: Verify distributable is clean (defense-in-depth)
        run: |
          DIR="dist/${{ needs.meta.outputs.plugin_slug }}"

          # Dev / VCS / CI / IDE / source artifacts must never appear in trunk.
          ANY=$(find "$DIR" \( \
                 -name ".git"          -o -name ".github"       -o -name ".wordpress-org" \
              -o \( -name "src" -a ! -path "*/vendor/*" \)      -o -name "tests" -o -name "node_modules" \
              -o -name ".yarn"         -o -name ".claude"       -o -name ".playwright-mcp" -o -name ".remember" \
              -o -name ".idea"         -o -name ".vscode" \
              -o -name "phpcs*.xml"    -o -name "phpstan.neon"  -o -name "phpunit.xml*" \
              -o -name "composer.json" -o -name "composer.lock" -o -name "package.json" \
              -o -name "*.zip"         -o -name "*.map"         -o -name ".DS_Store" -o -name "Thumbs.db" \
            \) -print)

          if [ -n "$ANY" ]; then
            echo "::error::Distributable contains files that must not ship to WordPress.org:"
            echo "$ANY"
            exit 1
          fi
          echo "Distributable is clean."
      - name: Create release zip
        run: |
          SLUG="${{ needs.meta.outputs.plugin_slug }}"
          ( cd dist && zip -rq "${SLUG}-${{ needs.meta.outputs.version }}.zip" "$SLUG" )
      - name: Upload dist/
        uses: actions/upload-artifact@v7
        with:
          name: plugin-dist-${{ needs.meta.outputs.version }}
          path: dist
          retention-days: 1

  # -------------------------------------------------------------------------
  # JOB 7 — deploy: publish to WordPress.org SVN + create GitHub release.
  #
  # The repo is checked out so the 10up action can find .wordpress-org at the
  # root and push banners/icons/screenshots to SVN assets/. Trunk content comes
  # from the pre-built, guard-verified dist/<slug> tree via BUILD_DIR (the
  # action ships BUILD_DIR verbatim — it does not re-apply .distignore).
  # -------------------------------------------------------------------------
  deploy:
    name: "Deploy: WP.org SVN + GitHub release"
    runs-on: ubuntu-latest
    needs: [meta, lint, phpstan, package]
    steps:
      - name: Checkout (provides .wordpress-org for SVN assets/)
        uses: actions/checkout@v6
      - name: Download dist/
        uses: actions/download-artifact@v8
        with:
          name: plugin-dist-${{ needs.meta.outputs.version }}
          path: dist
      - name: Deploy to WordPress.org via SVN
        id: deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        with:
          generate-zip: true
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG:         ${{ needs.meta.outputs.plugin_slug }}
          BUILD_DIR:    ./dist/${{ needs.meta.outputs.plugin_slug }}
          ASSETS_DIR:   .wordpress-org
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ github.ref_name }}
          name:       "Release ${{ needs.meta.outputs.version }}"
          prerelease: ${{ needs.meta.outputs.prerelease == 'true' }}
          files: dist/${{ needs.meta.outputs.plugin_slug }}-${{ needs.meta.outputs.version }}.zip
          body: |
            ## ${{ needs.meta.outputs.plugin_slug }} — v${{ needs.meta.outputs.version }}
            See the `== Changelog ==` section of [readme.txt](https://github.com/${{ github.repository }}/blob/trunk/readme.txt) for full details.
            - Deployed to https://wordpress.org/plugins/${{ needs.meta.outputs.plugin_slug }}/
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Summary
        if: always()
        run: |
          {
            echo "## Release ${{ needs.meta.outputs.version }}"
            echo "- WordPress.org: https://wordpress.org/plugins/${{ needs.meta.outputs.plugin_slug }}/"
            echo "- GitHub release: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          } >> "$GITHUB_STEP_SUMMARY"
